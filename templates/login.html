{% extends "base.html" %}

{% block title %}Login | Warke Traders{% endblock %}

{% block content %}
<section class="login-screen">
    <div class="container">
        <div class="row justify-content-center align-items-center min-vh-100">
            <div class="col-md-7 col-lg-5">
                <div class="login-card shadow-lg">
                    <div class="text-center mb-4">
                        <img src="{{ url_for('static', filename='images/logo.png') }}" class="login-logo mb-3" alt="Warke Traders logo">
                        <h1 class="h3 fw-bold mb-1">Warke Traders</h1>
                        <p class="text-muted mb-0">Pro. Pra. Harshal Warke</p>
                    </div>

                    <form method="post" class="needs-validation" novalidate>
                        <div class="mb-3">
                            <label for="username" class="form-label">Username</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-person"></i></span>
                                <input type="text" class="form-control" id="username" name="username" required autofocus>
                                <div class="invalid-feedback">Username is required.</div>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label for="password" class="form-label">Password</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                                <input type="password" class="form-control" id="password" name="password" required>
                                <div class="invalid-feedback">Password is required.</div>
                            </div>
                        </div>
                        <button class="btn btn-primary w-100 btn-lg" type="submit">
                            <i class="bi bi-box-arrow-in-right me-2"></i>Login
                        </button>
                        <div class="text-center mt-3">
                            <a href="{{ url_for('employee_login') }}" class="text-decoration-none">Employee login</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
<script>
    (() => {
        const forms = document.querySelectorAll('.needs-validation');
        Array.from(forms).forEach((form) => {
            form.addEventListener('submit', (event) => {
                if (!form.checkValidity()) {
                    event.preventDefault();
                    event.stopPropagation();
                }
                form.classList.add('was-validated');
            });
        });
    })();
</script>
{% endblock %}
