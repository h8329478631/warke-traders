{% extends "base.html" %}

{% block title %}Edit Employee | Warke Traders{% endblock %}

{% block content %}
<div class="container">
    <div class="page-header mb-4">
        <div>
            <h1 class="h2 fw-bold mb-1">Edit Employee</h1>
            <p class="text-muted mb-0">Update employee profile and login details.</p>
        </div>
        <a href="{{ url_for('employees') }}" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left me-1"></i>Back
        </a>
    </div>

    <form method="post" enctype="multipart/form-data" class="content-panel needs-validation" novalidate>
        <div class="row g-3">
            <div class="col-md-12">
                {% if employee.profile_image %}
                <img src="{{ url_for('static', filename=employee.profile_image) }}" class="employee-avatar employee-avatar-lg" alt="{{ employee.full_name }}">
                {% endif %}
            </div>
            <div class="col-md-6">
                <label for="full_name" class="form-label">Full name</label>
                <input type="text" class="form-control" id="full_name" name="full_name" value="{{ employee.full_name or '' }}" required>
            </div>
            <div class="col-md-6">
                <label for="username" class="form-label">Username</label>
                <input type="text" class="form-control" id="username" name="username" value="{{ employee.username }}" required>
            </div>
            <div class="col-md-6">
                <label for="password" class="form-label">New password</label>
                <input type="password" class="form-control" id="password" name="password" minlength="6">
            </div>
            <div class="col-md-6">
                <label for="mobile" class="form-label">Mobile</label>
                <input type="text" class="form-control" id="mobile" name="mobile" value="{{ employee.mobile or '' }}" required>
            </div>
            <div class="col-md-4">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control" id="email" name="email" value="{{ employee.email or '' }}">
            </div>
            <div class="col-md-4">
                <label for="aadhaar_number" class="form-label">Aadhaar number</label>
                <input type="text" class="form-control" id="aadhaar_number" name="aadhaar_number" value="{{ employee.aadhaar_number or '' }}">
            </div>
            <div class="col-md-4">
                <label for="profile_image" class="form-label">Replace profile image</label>
                <input type="file" class="form-control" id="profile_image" name="profile_image" accept=".png,.jpg,.jpeg,.webp">
            </div>
            <div class="col-12">
                <label for="address" class="form-label">Address</label>
                <textarea class="form-control" id="address" name="address" rows="3">{{ employee.address or '' }}</textarea>
            </div>
        </div>
        <button class="btn btn-primary mt-4" type="submit">
            <i class="bi bi-check-circle me-1"></i>Update Employee
        </button>
    </form>
</div>
{% endblock %}
